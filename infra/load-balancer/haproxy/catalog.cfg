global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option redispatch
    retries 2
    timeout connect 3s
    timeout client 30s
    timeout server 30s

frontend catalog_frontend
    bind 127.0.0.1:18040
    default_backend catalog_backend

backend catalog_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 2s fall 2 rise 1

    server catalog-1 100.95.65.46:8040 check
    # Activer ces lignes quand des instances supplementaires existent.
    # server catalog-2 100.95.65.46:8140 check
    # server catalog-3 100.95.65.46:8240 check
    # server catalog-4 100.95.65.46:8340 check
